<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5EFE0;color:#2C1A0E}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit;color:#2C1A0E}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
#content{flex:1;overflow-y:auto;padding:16px 16px 80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #E8D5B0;display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none}
.nav-btn span{font-size:9px;font-weight:500;color:#9E8C78}
.nav-btn.active span{font-weight:700;color:#6B3F1F}
.nav-btn svg{color:#9E8C78}
.nav-btn.active svg{color:#6B3F1F}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(44,26,14,.07)}
.btn{border:none;border-radius:10px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-md{padding:10px 18px;font-size:15px}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-primary{background:#6B3F1F;color:#fff}
.btn-danger{background:#C0392B;color:#fff}
.btn-success{background:#2E7D32;color:#fff}
.btn-amber{background:#C4894B;color:#fff}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E8D5B0;background:#fff;font-size:15px;outline:none}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.chip.active{background:#6B3F1F;color:#fff}
.chip.inactive{background:#E8D5B0;color:#2C1A0E}
.modal-overlay{position:fixed;inset:0;background:rgba(44,26,14,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}

const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const todayKey=()=>new Date().toISOString().split('T')[0];
const nowStr=()=>new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

// Firebase paths
// Shared data (all users see): products, mermaProducts, progGrupos, hornadaHistory
// Per-user data: cierre, mermaData per day, userTurnos, activeHornadas
function fbSharedRef(k){ return db.ref('shared/'+k); }
function fbUserRef(user,k){ return db.ref('users/'+user+'/'+k); }

let fbSyncEnabled = false;
let fbListeners = [];

function fbSet(ref, val){
  if(fbSyncEnabled) ref.set(val).catch(e=>console.warn('FB write:',e));
}

function fbCleanupListeners(){
  fbListeners.forEach(([ref,ev,fn])=>ref.off(ev,fn));
  fbListeners=[];
}

function fbListen(ref, cb){
  const fn = snap=>{ if(snap.exists()) cb(snap.val()); };
  ref.on('value', fn);
  fbListeners.push([ref,'value',fn]);
}

// Push all local state to Firebase
function fbPushAll(){
  const u=state.currentUser;
  fbSet(fbSharedRef('products'), state.products);
  fbSet(fbSharedRef('mermaProducts'), state.mermaProducts);
  fbSet(fbSharedRef('progGrupos'), S.get('bertiz_prog_grupos', null));
  fbSet(fbSharedRef('hornadaHistory'), state.hornadaHistory.length?state.hornadaHistory:null);
  fbSet(fbUserRef(u,'turnos'), Object.keys(state.userTurnos).length?state.userTurnos:null);
  fbSet(fbUserRef(u,'cierre_'+todayKey()), state.tasks);
  fbSet(fbUserRef(u,'mermaData'), Object.keys(state.mermaData).length?state.mermaData:null);
  fbSet(fbUserRef(u,'activeHornadas'), state.activeHornadas.length?state.activeHornadas:null);
}

// Subscribe to shared + user data, update local state + re-render on changes
function fbSubscribe(){
  fbCleanupListeners();
  const u=state.currentUser;

  // Shared: products
  fbListen(fbSharedRef('products'), val=>{
    state.products=val; S.set('bertiz_products',val);
    if(state.tab==='hornadas') render();
  });
  // Shared: mermaProducts
  fbListen(fbSharedRef('mermaProducts'), val=>{
    state.mermaProducts=val; S.set('merma_products',val);
    if(state.tab==='mermas') render();
  });
  // Shared: programas
  fbListen(fbSharedRef('progGrupos'), val=>{
    S.set('bertiz_prog_grupos',val);
    if(state.tab==='programas') render();
  });
  // Shared: hornada history (all users contribute)
  fbListen(fbSharedRef('hornadaHistory'), val=>{
    if(Array.isArray(val)){ state.hornadaHistory=val; S.set('bertiz_history',val); }
    if(state.tab==='hornadas'||state.tab==='historial') render();
  });
  // User: cierre (with old-format protection)
  fbListen(fbUserRef(u,'cierre_'+todayKey()), val=>{
    if(val && Array.isArray(val) && val.length>0){
      const OLD_CATS=['Producción','Limpieza','Cafetera','Reposición','Cierre','Otras'];
      const hasOld=val.some(t=>OLD_CATS.includes(t.cat));
      if(!hasOld){
        state.tasks=val; S.set('cierre_'+todayKey(),val);
        if(state.tab==='cierre') render();
      } else {
        // Old data in Firebase — overwrite it with new format
        fbSet(fbUserRef(u,'cierre_'+todayKey()), state.tasks);
      }
    }
  });
  // User: turnos
  fbListen(fbUserRef(u,'turnos'), val=>{
    state.userTurnos=val||{}; S.set('bertiz_user_turnos',val||{});
    if(state.tab==='calendario') render();
  });
  // User: mermaData
  fbListen(fbUserRef(u,'mermaData'), val=>{
    state.mermaData=val||{}; S.set('merma_data',val||{});
    if(state.tab==='mermas') render();
  });
  // ALL users mermaData combined for team view
  PERSONAS.forEach(p=>{
    fbListen(fbUserRef(p,'mermaData'), val=>{
      // Store each user's merma separately for team historial
      S.set('merma_data_'+p, val||{});
    });
  });
}

// Sync all team turnos for the calendar team view
function fbSubscribeTeamTurnos(){
  PERSONAS.forEach(p=>{
    fbListen(fbUserRef(p,'turnos'), val=>{
      S.set('user_turnos_'+p, val||{});
    });
  });
}

// Init Firebase sync after user is known
function initFirebase(){
  fbSyncEnabled=true;
  showSyncStatus('Conectando...',false);
  // First push local data
  fbPushAll();
  // Then subscribe
  fbSubscribe();
  fbSubscribeTeamTurnos();
  // Connection state
  db.ref('.info/connected').on('value', snap=>{
    showSyncStatus(snap.val()?'🟢 Sincronizado':'🔴 Sin conexión', snap.val());
  });
}

function showSyncStatus(msg, ok){
  const el=document.getElementById('sync-status');
  if(el){ el.textContent=msg; el.style.color=ok?'#2E7D32':'#C0392B'; }
}

// Always read fresh from localStorage — never cache stale state
function freshState(){
  return {
    tab: 'home',
    currentUser: S.get('bertiz_user','Haizea'),
    tasks: S.get('cierre_'+todayKey(), DEFAULT_TASKS.map(t=>({...t,done:false,doneAt:null}))),
    taskFilter:'Todas', // always reset to Todas
    products: S.get('bertiz_products', JSON.parse(JSON.stringify(PRODUCTS_DEF))),
    activeHornadas: S.get('bertiz_active', []),
    hornadaHistory: S.get('bertiz_history', []),
    mermaProducts: S.get('merma_products', [...MERMA_DEF]),
    mermaCats: S.get('merma_cats', JSON.parse(JSON.stringify(MERMA_CATS_DEF))),
    mermaData: S.get('merma_data', {}),
    userTurnos: S.get('bertiz_user_turnos', {}),
    calView:'mes',
    calMonth: new Date().getFullYear()*100 + new Date().getMonth(),
    teamDate: todayKey(),
    timers:{},
  };
}
let state = freshState();

// Atomic saves — each key saved immediately on every mutation
function save(){
  const u=state.currentUser;
  S.set('bertiz_user', u);
  S.set('cierre_'+todayKey(), state.tasks);
  S.set('bertiz_products', state.products);
  S.set('bertiz_active', state.activeHornadas);
  S.set('bertiz_history', state.hornadaHistory);
  S.set('merma_products', state.mermaProducts);
  S.set('merma_cats', state.mermaCats);
  S.set('merma_data', state.mermaData);
  S.set('bertiz_user_turnos', state.userTurnos);
  // Firebase sync
  if(fbSyncEnabled){
    fbSet(fbSharedRef('products'), state.products);
    fbSet(fbSharedRef('mermaProducts'), state.mermaProducts);
    fbSet(fbSharedRef('hornadaHistory'), state.hornadaHistory.length?state.hornadaHistory:null);
    fbSet(fbUserRef(u,'cierre_'+todayKey()), state.tasks);
    fbSet(fbUserRef(u,'mermaData'), state.mermaData);
    fbSet(fbUserRef(u,'turnos'), state.userTurnos);
    fbSet(fbUserRef(u,'activeHornadas'), state.activeHornadas.length?state.activeHornadas:null);
  }
}
function saveKey(key, val){
  // Immediate single-key save for high-frequency operations
  S.set(key, val);
}
// Save on every possible exit event
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });
window.addEventListener('beforeunload', ()=>save());
window.addEventListener('pagehide', ()=>save());
// Reload fresh state when app becomes visible again (tab switch back)
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){
    const tab=state.tab, calView=state.calView, calMonth=state.calMonth, teamDate=state.teamDate, taskFilter=state.taskFilter, timers=state.timers;
    state=freshState();
    state.tab=tab; state.calView=calView; state.calMonth=calMonth; state.teamDate=teamDate; state.taskFilter=taskFilter; state.timers=timers;
  }
});

// ─── MODAL ────────────────────────────────────────────────────────────────────
let modalStack=[];
function openModal(html, onSubmit){
  const ov=document.createElement('div');
  ov.className='modal-overlay anim';
  ov.innerHTML=`<div class="modal-box">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  ov.querySelector('.modal-close')?.addEventListener('click',closeModal);
  document.getElementById('modal-root').appendChild(ov);
  modalStack.push(ov);
  if(onSubmit){
    ov.querySelector('[data-submit]')?.addEventListener('click',()=>{
      if(onSubmit(ov)) closeModal();
    });
  }
  ov.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',closeModal));
  return ov;
}
function closeModal(){
  const ov=modalStack.pop();
  if(ov) ov.remove();
}

}

}

  const clockInt=setInterval(()=>{ if(document.contains(clockEl)) clockEl.textContent=nowStr(); else clearInterval(clockInt); },1000);

  // Switch user
  c.querySelector('#btn-switch-user').addEventListener('click',showUserPicker);
  // Tab links
  c.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{ state.tab=el.dataset.tab; render(); }));

function showUserPicker(){
  openModal(`
    <div class="modal-head"><h2 style="font-size:18px;font-weight:800">¿Quién eres?</h2><button class="modal-close">${svg('close',20,'#9E8C78')}</button></div>
    <p style="font-size:13px;color:#9E8C78;margin-bottom:16px">Selecciona tu nombre para ver tu calendario</p>
    ${PERSONAS.map(p=>`
      <button data-persona="${p}" style="width:100%;padding:12px 16px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;background:${p===state.currentUser?'#F5EFE0':'#fff'};border:2px solid ${p===state.currentUser?PCOLORS[p]:'#E8D5B0'}">
        <div style="width:32px;height:32px;border-radius:16px;background:${PCOLORS[p]};color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center">${p[0]}</div>
        <span style="font-weight:${p===state.currentUser?800:600}">${p}${p===state.currentUser?' ✓':''}</span>
      </button>`).join('')}
  `);

const CATS=['Todas','Producción','Limpieza','Cafetera','Reposición','Cierre'];
function renderCierre(c){
  const tasks=state.tasks;
  const done=tasks.filter(t=>t.done).length;
  const pct=Math.round(done/Math.max(tasks.length,1)*100);

  const BERTIZ_SEP=`<div style="display:flex;align-items:center;gap:10px;margin:8px 0 16px"><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,#C4894B)"></div><span style="color:#C4894B;font-size:11px">✦</span><div style="flex:1;height:1px;background:linear-gradient(to left,transparent,#C4894B)"></div></div>`;

  function taskRow(t){
    const col=RANGE_COLORS[t.cat]||'#9E8C78';
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:${t.done?'#F5EFE0':'#fff'};border-radius:12px;margin-bottom:6px;border-left:3px solid ${t.urgent&&!t.done?'#C0392B':col}">
      <button class="task-toggle" data-id="${t.id}" style="width:24px;height:24px;border-radius:6px;border:2px solid ${t.done?'#2E7D32':'#E8D5B0'};background:${t.done?'#2E7D32':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${t.done?svg('check',14,'#fff'):''}
      </button>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:${t.urgent?700:500};color:${t.done?'#9E8C78':'#2C1A0E'};text-decoration:${t.done?'line-through':'none'}">${t.text}${t.urgent&&!t.done?' ⚡':''}</div>
        ${t.done&&t.doneAt?`<div style="font-size:11px;color:#9E8C78;margin-top:1px">✓ ${t.doneAt}</div>`:''}
      </div>
      <button class="task-edit" data-id="${t.id}" style="padding:5px;flex-shrink:0">${svg('edit',14,'#9E8C78')}</button>
      <button class="task-del" data-id="${t.id}" style="padding:5px;flex-shrink:0">${svg('trash',14,'#C0392B')}</button>
    </div>`;
  }

  // Always reset if old categories
  if(!TIME_RANGES.includes(state.taskFilter)) state.taskFilter='Todas';
  const groupView=state.taskFilter==='Todas';
  const shown=groupView?tasks:tasks.filter(t=>t.cat===state.taskFilter);

  let bodyHTML='';
  if(groupView){
    TIME_RANGES.forEach((range,idx)=>{
      const rt=tasks.filter(t=>t.cat===range);
      if(!rt.length) return;
      const rd=rt.filter(t=>t.done).length;
      const col=RANGE_COLORS[range]||'#9E8C78';
      const allDone=rd===rt.length;
      bodyHTML+=`${idx>0?BERTIZ_SEP:''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-size:10px;font-weight:700;color:${col};text-transform:uppercase;letter-spacing:1px;margin-bottom:1px">Franja horaria</div>
            <div style="font-size:18px;font-weight:900;color:${allDone?'#2E7D32':col}">${range}${allDone?' ✓':''}</div>
          </div>
          <div style="background:${allDone?'#2E7D32':col};border-radius:20px;padding:4px 12px">
            <span style="font-size:13px;font-weight:800;color:#fff">${rd}/${rt.length}</span>
          </div>
        </div>
        ${rt.map(taskRow).join('')}`;
    });
    const custom=tasks.filter(t=>!TIME_RANGES.includes(t.cat));
    if(custom.length) bodyHTML+=`${BERTIZ_SEP}<div style="font-size:16px;font-weight:800;color:#9E8C78;margin-bottom:10px">📋 Otras</div>${custom.map(taskRow).join('')}`;
  } else {
    bodyHTML=shown.length?shown.map(taskRow).join(''):`<div style="text-align:center;padding:40px;color:#9E8C78">Sin tareas en esta franja</div>`;
  }

  c.innerHTML=`
    <h1 class="page-title">Checklist Cierre</h1>
    <p class="muted" style="font-size:12px;margin-bottom:12px">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</p>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:700">${done} de ${tasks.length} tareas</span>
        <span style="font-weight:800;color:${pct===100?'#2E7D32':'#C4894B'}">${pct}%</span>
      </div>
      <div style="background:#F5EFE0;border-radius:8px;height:10px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${pct===100?'#2E7D32':'#C4894B'};border-radius:8px;transition:width .4s"></div>
      </div>
      ${pct===100?'<div style="text-align:center;margin-top:8px;font-size:13px;color:#2E7D32;font-weight:700">¡Cierre completado! 🎉</div>':''}
    </div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px">
      <button class="chip ${state.taskFilter==='Todas'?'active':'inactive'}" data-cat="Todas" style="flex-shrink:0">🕐 Por horas</button>
      ${TIME_RANGES.map(r=>`<button class="chip ${state.taskFilter===r?'active':'inactive'}" data-cat="${r}" style="flex-shrink:0;font-size:11px">${r}</button>`).join('')}
    </div>
    ${bodyHTML}
    <div style="height:80px"></div>
    <button id="btn-add-task" style="position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:28px;background:#6B3F1F;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(107,63,31,.4);z-index:50">
      ${svg('plus',28,'#fff')}
    </button>`;

  c.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{ state.taskFilter=b.dataset.cat; renderCierre(c); }));
  c.querySelectorAll('.task-toggle').forEach(b=>b.addEventListener('click',()=>{
    const id=+b.dataset.id;
    state.tasks=state.tasks.map(t=>t.id===id?{...t,done:!t.done,doneAt:!t.done?nowStr():null}:t);
    save(); renderCierre(c);
  }));
  c.querySelectorAll('.task-del').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('¿Eliminar tarea?')){ state.tasks=state.tasks.filter(t=>t.id!==+b.dataset.id); save(); renderCierre(c); }
  }));
  c.querySelectorAll('.task-edit').forEach(b=>b.addEventListener('click',()=>{
    openTaskModal(state.tasks.find(x=>x.id===+b.dataset.id),c);
  }));
  c.querySelector('#btn-add-task').addEventListener('click',()=>openTaskModal(null,c));
}


function openTaskModal(task, c){
  let isUrgent=task?task.urgent:false;
  openModal(`
    <div class="modal-head"><h2 style="font-size:18px;font-weight:800">${task?'Editar tarea':'Nueva tarea'}</h2><button class="modal-close">${svg('close',20,'#9E8C78')}</button></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Descripción</div>
        <input class="inp" id="t-text" placeholder="Descripción de la tarea..." value="${task?task.text.replace(/"/g,'&quot;'):''}">
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Franja horaria</div>
        <select class="inp" id="t-cat">
          ${TIME_RANGES.map(r=>`<option ${task&&task.cat===r?'selected':''}>${r}</option>`).join('')}
          <option ${task&&!TIME_RANGES.includes(task.cat)?'selected':''}>Otras</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button id="t-urgent-off" style="flex:1;padding:10px;border-radius:10px;font-weight:700;background:${!isUrgent?'#6B3F1F':'#F5EFE0'};color:${!isUrgent?'#fff':'#9E8C78'}">Normal</button>
        <button id="t-urgent-on" style="flex:1;padding:10px;border-radius:10px;font-weight:700;background:${isUrgent?'#C0392B':'#F5EFE0'};color:${isUrgent?'#fff':'#9E8C78'}">⚡ Urgente</button>
      </div>
      <button id="t-save" class="btn btn-md btn-primary" style="width:100%;justify-content:center">${svg('save',18,'#fff')} Guardar</button>
      ${task?`<button id="t-del" class="btn btn-md btn-danger" style="width:100%;justify-content:center">${svg('trash',16,'#fff')} Eliminar tarea</button>`:''}
    </div>
  `);
  function updateUrgentBtns(){
    document.querySelector('#t-urgent-off').style.background=!isUrgent?'#6B3F1F':'#F5EFE0';
    document.querySelector('#t-urgent-off').style.color=!isUrgent?'#fff':'#9E8C78';
    document.querySelector('#t-urgent-on').style.background=isUrgent?'#C0392B':'#F5EFE0';
    document.querySelector('#t-urgent-on').style.color=isUrgent?'#fff':'#9E8C78';
  }
  document.querySelector('#t-urgent-off').addEventListener('click',()=>{isUrgent=false;updateUrgentBtns();});
  document.querySelector('#t-urgent-on').addEventListener('click',()=>{isUrgent=true;updateUrgentBtns();});
  document.querySelector('#t-save').addEventListener('click',()=>{
    const text=document.querySelector('#t-text').value.trim();
    const cat=document.querySelector('#t-cat').value;
    if(!text){alert('Escribe una descripción');return;}
    if(task) state.tasks=state.tasks.map(t=>t.id===task.id?{...t,text,cat,urgent:isUrgent}:t);
    else state.tasks=[...state.tasks,{id:Date.now(),text,cat,done:false,doneAt:null,urgent:isUrgent}];
    save(); closeModal(); renderCierre(c);
  });
  document.querySelector('#t-del')?.addEventListener('click',()=>{
    if(confirm('¿Eliminar esta tarea?')){
      state.tasks=state.tasks.filter(t=>t.id!==task.id);
      save(); closeModal(); renderCierre(c);
    }
  });
}

// ─── HORNADAS ─────────────────────────────────────────────────────────────────
function fmtTimer(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function parseHour(str){
  if(!str) return null;
  str=str.trim().replace(',','.');
  if(str.includes(':')){ const [h,m]=str.split(':'); return +h+(+m/60); }
  return +str;
}

// RANGO HORAS: given a from/to in decimal hours, summarize hornadas
function buildRangeView(fromH, toH){
  const all=[...state.activeHornadas,...state.hornadaHistory];
  const inRange=all.filter(h=>{
    const t=parseHour(h.startTime);
    return t!==null && t>=fromH && t<toH;
  });
  if(!inRange.length) return `
    <div style="text-align:center;padding:30px 20px;color:#9E8C78">
      <div style="font-size:32px;margin-bottom:8px">🍞</div>
      <div style="font-size:14px;font-weight:600">Sin hornadas registradas en este rango</div>
      <div style="font-size:12px;margin-top:4px">Registra hornadas en la pestaña Lista</div>
    </div>`;
  // Group by product
  const groups={};
  inRange.forEach(h=>{
    const n=h.product.name;
    if(!groups[n]) groups[n]={qty:0,times:[]};
    groups[n].qty+=(+h.qty||1);
    groups[n].times.push(h.startTime);
  });
  const total=Object.values(groups).reduce((a,b)=>a+b.qty,0);
  return `
    <div style="background:#6B3F1F;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#E8D5B0;font-size:13px;font-weight:600">Total piezas al horno</span>
      <span style="color:#fff;font-size:26px;font-weight:900">${total}</span>
    </div>
    ${Object.entries(groups).sort((a,b)=>b[1].qty-a[1].qty).map(([name,g])=>`
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-radius:12px;margin-bottom:6px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px;color:#2C1A0E">${name}</div>
          <div style="font-size:11px;color:#9E8C78;margin-top:2px">Hornada${g.times.length>1?'s':''}: ${g.times.join(', ')}</div>
        </div>
        <div style="background:#F5EFE0;border-radius:10px;padding:6px 14px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#6B3F1F">${g.qty}</div>
          <div style="font-size:10px;color:#9E8C78">piezas</div>
        </div>
      </div>`).join('')}`;
}

        Pan al horno entre las ${String(Math.floor(window._hRangeFrom)).padStart(2,'0')}:00 y las ${String(Math.floor(window._hRangeTo)).padStart(2,'0')}:00
      </div>
      <div id="range-results">${buildRangeView(window._hRangeFrom, window._hRangeTo)}</div>
    `}
    <div style="height:80px"></div>`;

  startTimers(c);

  c.querySelector('#btn-new-hornada').addEventListener('click',()=>openHornadaModal(null,c));
  c.querySelector('#btn-add-product').addEventListener('click',()=>openProductModal(null,c));
  c.querySelectorAll('.start-btn').forEach(b=>b.addEventListener('click',()=>{
    openHornadaModal(state.products.find(x=>x.id===+b.dataset.id),c);
  }));
  c.querySelectorAll('.edit-prod').forEach(b=>b.addEventListener('click',()=>{
    openProductModal(state.products.find(x=>x.id===+b.dataset.id),c);
  }));
  c.querySelectorAll('.del-prod').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('¿Eliminar este producto?')){
      state.products=state.products.filter(p=>p.id!==+b.dataset.id); save(); renderHornadas(c);
    }
  }));
  c.querySelectorAll('.finish-btn').forEach(b=>b.addEventListener('click',()=>{
    finishHornada(+b.dataset.id); renderHornadas(c);
  }));
  c.querySelectorAll('.edit-active-btn').forEach(b=>b.addEventListener('click',()=>{
    const h=state.activeHornadas.find(x=>x.id===+b.dataset.id);
    openEditActiveModal(h,c);
  }));
  // Edit/delete history entries
  const todayHist=state.hornadaHistory.filter(h=>h.date===todayKey());
  c.querySelectorAll('.edit-hist-btn').forEach(b=>b.addEventListener('click',()=>{
    openEditHistModal(todayHist[+b.dataset.i],c);
  }));
  c.querySelectorAll('.del-hist-btn').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('¿Eliminar este registro?')){
      const entry=todayHist[+b.dataset.i];
      state.hornadaHistory=state.hornadaHistory.filter(x=>x!==entry);
      save(); renderHornadas(c);
    }
  }));

  // View toggle
  c.querySelector('#h-v-lista')?.addEventListener('click',()=>{ window._hView='lista'; renderHornadas(c); });
  c.querySelector('#h-v-rango')?.addEventListener('click',()=>{ window._hView='rango'; renderHornadas(c); });

  // Range controls
  c.querySelector('#h-range-apply')?.addEventListener('click',()=>{
    const fv=c.querySelector('#h-range-from').value;
    const tv=c.querySelector('#h-range-to').value;
    window._hRangeFrom=parseHour(fv)||8;
    window._hRangeTo=parseHour(tv)||22;
    renderHornadas(c);
  });
  c.querySelectorAll('.range-quick').forEach(b=>b.addEventListener('click',()=>{
    window._hRangeFrom=+b.dataset.f;
    window._hRangeTo=+b.dataset.t;
    renderHornadas(c);
  }));
}

function startTimers(c){
  Object.values(state.timers).forEach(clearInterval);
  state.timers={};
  state.activeHornadas.forEach(h=>{
    state.timers[h.id]=setInterval(()=>{
      if(!document.contains(c)){clearInterval(state.timers[h.id]);return;}
      h.secondsLeft=Math.max(0,h.secondsLeft-1);
      save();
      const disp=c.querySelector(`.timer-display[data-id="${h.id}"]`);
      const bar=c.querySelector(`.timer-bar[data-id="${h.id}"]`);
      if(disp) disp.textContent=fmtTimer(h.secondsLeft);
      if(bar){bar.style.width=Math.round(h.secondsLeft/h.totalSecs*100)+'%';bar.style.background=h.secondsLeft<120?'#C0392B':'#C4894B';}
      if(h.secondsLeft===0){clearInterval(state.timers[h.id]);finishHornada(h.id);renderHornadas(c);}
    },1000);
  });
}

function finishHornada(id){
  const h=state.activeHornadas.find(x=>x.id===id);
  if(h) state.hornadaHistory=[{...h,endTime:nowStr()},...state.hornadaHistory];
  state.activeHornadas=state.activeHornadas.filter(x=>x.id!==id);
  save();
}

// ─── MERMAS ───────────────────────────────────────────────────────────────────
function renderMermas(c){
  const todayData=state.mermaData[todayKey()]||{};
  const total=Object.values(todayData).reduce((a,b)=>a+b,0);
  const allData=Object.values(state.mermaData).reduce((acc,day)=>{Object.entries(day).forEach(([k,v])=>{acc[k]=(acc[k]||0)+v});return acc},{});
  const maxProd=Object.entries(allData).sort((a,b)=>b[1]-a[1])[0];
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().split('T')[0];}).reverse();
  const cats=state.mermaCats||MERMA_CATS_DEF;

  const BERTIZ_SEP='<div style="display:flex;align-items:center;gap:10px;margin:12px 0 10px"><div style="flex:1;height:1px;background:linear-gradient(to right,transparent,#C4894B)"></div><span style="color:#C4894B;font-size:11px">✦</span><div style="flex:1;height:1px;background:linear-gradient(to left,transparent,#C4894B)"></div></div>';

  function prodRow(prod){
    const val=todayData[prod]||0;
    return `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-radius:12px;margin-bottom:6px">
      <div style="flex:1;font-weight:600;font-size:14px">${prod}</div>
      <button class="m-dec" data-prod="${prod}" style="width:36px;height:36px;border-radius:8px;background:#F5EFE0;font-weight:800;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>
      <span style="font-size:20px;font-weight:800;min-width:32px;text-align:center;color:${val>0?'#C0392B':'#9E8C78'}">${val}</span>
      <button class="m-inc" data-prod="${prod}" style="width:36px;height:36px;border-radius:8px;background:#C4894B;font-weight:800;font-size:20px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>
      <button class="m-del" data-prod="${prod}" style="padding:5px;background:#FFF0EE;border-radius:7px;flex-shrink:0">${svg('trash',14,'#C0392B')}</button>
    </div>`;
  }

  const catsHTML=cats.map((cat,ci)=>`
    ${ci>0?BERTIZ_SEP:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:${cat.color};text-transform:uppercase;letter-spacing:1px">${cat.cat==='Nature'?'🌿':cat.cat==='Pan'?'🍞':cat.cat==='Bollería mini'?'✨':cat.cat==='Bollería'?'🥐':'🫓'} ${cat.cat}</div>
      <button class="m-add-to-cat" data-ci="${ci}" style="font-size:11px;font-weight:700;color:${cat.color}">+ añadir</button>
    </div>
    ${cat.items.length?cat.items.map(prodRow).join(''):`<div style="font-size:13px;color:#9E8C78;padding:8px 0">Sin productos — toca "+ añadir"</div>`}
  `).join('');

  c.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div><h1 class="page-title" style="margin:0">Mermas</h1><p class="muted" style="font-size:12px">${todayKey()}</p></div>
      <div style="text-align:right"><div style="font-size:28px;font-weight:900;color:#C0392B">${total}</div><div style="font-size:12px;color:#9E8C78">total hoy</div></div>
    </div>
    ${maxProd?`<div class="card" style="background:#F5EFE0;margin-bottom:12px;font-size:13px;color:#9E8C78">Más tirado: <strong style="color:#C0392B">${maxProd[0]}</strong> (${maxProd[1]} en total)</div>`:''}
    ${catsHTML}
    <div style="height:12px"></div>
    <div class="section-label" style="margin-top:20px">Últimos 7 días</div>
    <div class="card">
      <div style="display:flex;gap:6px;align-items:flex-end;height:80px">
        ${last7.map(d=>{
          const val=Object.values(state.mermaData[d]||{}).reduce((a,b)=>a+b,0);
          const maxVal=Math.max(...last7.map(x=>Object.values(state.mermaData[x]||{}).reduce((a,b)=>a+b,0)),1);
          const h=Math.round(val/maxVal*70);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:11px;color:#9E8C78;font-weight:${val?700:400}">${val||''}</div>
            <div style="width:100%;height:${h||4}px;background:${d===todayKey()?'#C0392B':'#E8D5B0'};border-radius:4px 4px 0 0"></div>
            <div style="font-size:10px;color:#9E8C78">${d.slice(8)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="height:80px"></div>`;

  // +/- buttons
  c.querySelectorAll('.m-inc,.m-dec').forEach(b=>b.addEventListener('click',()=>{
    const prod=b.dataset.prod;
    const d={...(state.mermaData[todayKey()]||{})};
    d[prod]=Math.max(0,(d[prod]||0)+(b.classList.contains('m-inc')?1:-1));
    state.mermaData={...state.mermaData,[todayKey()]:d};
    save(); renderMermas(c);
  }));

  // Delete product
  c.querySelectorAll('.m-del').forEach(b=>b.addEventListener('click',()=>{
    const prod=b.dataset.prod;
    if(confirm(`¿Eliminar ${prod}?`)){
      state.mermaCats=state.mermaCats.map(cat=>({...cat,items:cat.items.filter(p=>p!==prod)}));
      state.mermaProducts=state.mermaProducts.filter(p=>p!==prod);
      save(); renderMermas(c);
    }
  }));

  // Add product to category
  c.querySelectorAll('.m-add-to-cat').forEach(b=>b.addEventListener('click',()=>{
    const ci=+b.dataset.ci;
    const cat=state.mermaCats[ci];
    openModal(`
      <div class="modal-head"><h2 style="font-size:18px;font-weight:800">Añadir a ${cat.cat}</h2><button class="modal-close">${svg('close',20,'#9E8C78')}</button></div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <input class="inp" id="new-merma-name" placeholder="Nombre del producto">
        <button id="ok-new-merma" class="btn btn-md btn-primary" style="width:100%;justify-content:center">${svg('save',18,'#fff')} Añadir</button>
      </div>
    `);
    document.querySelector('#ok-new-merma').addEventListener('click',()=>{
      const name=document.querySelector('#new-merma-name').value.trim();
      if(!name) return;
      state.mermaCats[ci].items.push(name);
      state.mermaProducts=[...state.mermaProducts,name];
      save(); closeModal(); renderMermas(c);
    });
  }));
}


function renderHistorial(c){

  function drawHistorial(){
    const cierre=S.get('cierre_'+selDate,[]);
    const hornadas=state.hornadaHistory.filter(h=>h.date===selDate);
    const mermaD=(state.mermaData[selDate])||{};
    c.innerHTML=`
      <h1 class="page-title">Historial</h1>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px">

      </div>
      <div class="section-label">✓ Cierre</div>
      ${cierre.length===0?'<p class="muted" style="font-size:13px;margin-bottom:16px">Sin datos</p>':

          ${cierre.filter(t=>!t.done).map(t=>`<div style="font-size:13px;padding:4px 0;display:flex;gap:8px"><span class="muted">○</span><span class="muted" style="text-decoration:line-through">${t.text}</span></div>`).join('')}
        </div>`}
      <div class="section-label">🔥 Hornadas</div>
      ${hornadas.length===0?'<p class="muted" style="font-size:13px;margin-bottom:16px">Sin hornadas</p>':
        hornadas.map(h=>`<div class="card" style="margin-bottom:8px"><div style="font-weight:700">${h.product.name} x${h.qty}</div><div style="font-size:12px;color:#9E8C78">${h.startTime} → ${h.endTime} · Prog ${h.product.prog} · ${h.product.temp}°C</div></div>`).join('')}
      <div class="section-label">🗑 Mermas</div>
      ${Object.keys(mermaD).length===0?'<p class="muted" style="font-size:13px">Sin mermas</p>':
        `<div class="card">${Object.entries(mermaD).map(([p,v])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5EFE0"><span style="font-size:14px">${p}</span><span style="font-size:16px;font-weight:800;color:${v>5?'#C0392B':'#9E8C78'}">${v}</span></div>`).join('')}<div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:13px;font-weight:700;color:#9E8C78">TOTAL</span><span style="font-size:18px;font-weight:900;color:#C0392B">${Object.values(mermaD).reduce((a,b)=>a+b,0)}</span></div></div>`}
      <div style="height:80px"></div>`;
    c.querySelectorAll('.hist-date').forEach(b=>b.addEventListener('click',()=>{ selDate=b.dataset.d; drawHistorial(); }));
  }
  drawHistorial();
}

// ─── CALENDARIO HELPERS (global) ─────────────────────────────────────────────
function shiftColor(t){
  if(!t||!t.trabaja) return '#F5C518';
  const h=t.horario||'';
  const start=parseFloat((h.split('-')[0]||'14').replace(':','.'));
  if(start<12) return '#E8821A';
  return '#2E7D32';
}
function shiftLabel(t){
  if(!t||!t.trabaja) return '';
  return (t.horario||'').split('-')[0]||'';
}

// ─── CALENDARIO ───────────────────────────────────────────────────────────────
function buildHoyCard(t){
  if(!t){
    return `<div class="card" style="background:#F5C518;margin-bottom:16px">
      <div style="font-weight:700;color:#555">😴 Hoy libre</div>
      <button data-k="${todayKey()}" class="day-btn-hoy" style="margin-top:6px;color:#555;font-size:13px;font-weight:700">+ Añadir turno</button>
    </div>`;
  }
  const col = shiftColor(t);
  const label = t.trabaja ? (parseFloat((t.horario||'14').split('-')[0])<12 ? '☀️ Turno de mañana':'🌙 Turno de tarde') : '😴 Hoy libre';
  const compasLine = (t.compas&&t.compas.length) ? '<div style="color:rgba(255,255,255,.8);font-size:13px;margin-top:4px">Con: '+t.compas.join(', ')+'</div>' : '';
  const notasLine  = t.notas ? '<div style="color:rgba(255,255,255,.75);font-size:12px;margin-top:4px;font-style:italic">'+t.notas+'</div>' : '';
  const horarioLine = t.trabaja ? '<div style="color:#fff;font-size:20px;font-weight:800;margin-top:2px">'+t.horario+'</div>' : '';
  return `<div class="card" style="background:linear-gradient(135deg,${col},${col}BB);margin-bottom:16px">
    <div style="font-weight:800;font-size:15px;color:#fff">${label}</div>
    ${horarioLine}${compasLine}${notasLine}
    <button data-k="${todayKey()}" class="day-btn-hoy" style="margin-top:10px;background:rgba(255,255,255,.2);border-radius:8px;padding:6px 14px;color:#fff;font-size:12px;font-weight:700">✏️ Editar turno</button>
  </div>`;
}

function renderCalendario(c){
  let calYear=Math.floor(state.calMonth/100);
  let calMon=state.calMonth%100;

  function getTurno(dateKey){
    if(state.userTurnos[dateKey]) return state.userTurnos[dateKey];
    const td=TEAM[dateKey];
    if(td&&td[state.currentUser]) return {trabaja:true,horario:td[state.currentUser],notas:''};
    return null;
  }

  function drawCal(){
    const firstDay=new Date(calYear,calMon,1).getDay();
    const daysInMonth=new Date(calYear,calMon+1,0).getDate();
    const blanks=Array((firstDay||7)-1).fill(null);
    const days=[...blanks,...Array.from({length:daysInMonth},(_,i)=>i+1)];
    const todayT=getTurno(todayKey());
    const monthStr=new Date(calYear,calMon).toLocaleDateString('es-ES',{month:'long',year:'numeric'});

    c.innerHTML=`
      <h1 class="page-title">Turnos</h1>
      <div style="display:flex;background:#E8D5B0;border-radius:12px;padding:3px;margin-bottom:16px">
        <button id="v-mes" style="flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:700;background:${state.calView==='mes'?'#fff':'transparent'};color:${state.calView==='mes'?'#2C1A0E':'#9E8C78'}">📅 Mi calendario</button>
        <button id="v-equipo" style="flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:700;background:${state.calView==='equipo'?'#fff':'transparent'};color:${state.calView==='equipo'?'#2C1A0E':'#9E8C78'}">👥 Equipo</button>
      </div>
      ${state.calView==='mes'?`
        ${buildHoyCard(todayT)}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <button id="prev-month" style="padding:8px;color:#6B3F1F;font-weight:700;font-size:20px">‹</button>
          <span style="font-weight:800;font-size:16px;text-transform:capitalize">${monthStr}</span>
          <button id="next-month" style="padding:8px;color:#6B3F1F;font-weight:700;font-size:20px">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
          ${['L','M','X','J','V','S','D'].map(d=>`<div style="text-align:center;font-size:12px;font-weight:700;color:#9E8C78;padding:4px 0">${d}</div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
          ${days.map((d,i)=>{
            if(!d) return '<div></div>';
            const k=`${calYear}-${String(calMon+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const t=getTurno(k), isToday=k===todayKey();
            const isEdited=!!state.userTurnos[k];
            const bgCol=isToday?'#2C1A0E':shiftColor(t);
            const textCol=isToday?'#fff':(t&&!t.trabaja?'#555':'#fff');
            const lbl=shiftLabel(t);
            return `<button class="day-btn" data-k="${k}" style="aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:${bgCol};border:${isToday?'2.5px solid #C4894B':'none'}">
              <span style="font-size:13px;font-weight:${isToday?900:700};color:${textCol}">${d}</span>
              ${lbl?`<span style="font-size:7px;color:${isToday?'#C4894B':'rgba(255,255,255,.85)'};line-height:1.2;margin-top:1px">${lbl}</span>`:''}
              ${isEdited?'<span style="position:absolute;top:2px;right:3px;font-size:8px;color:rgba(255,255,255,.9)">✏</span>':''}
            </button>`;
          }).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center">
          <div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:#E8821A"></div><span style="font-size:12px;color:#9E8C78">Mañana</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:#2E7D32"></div><span style="font-size:12px;color:#9E8C78">Tarde</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:#F5C518"></div><span style="font-size:12px;color:#9E8C78">Libre</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border-radius:3px;background:#2C1A0E"></div><span style="font-size:12px;color:#9E8C78">Hoy</span></div>
          <span style="font-size:11px;color:#C4894B;font-weight:700">✏ editado</span>
        </div>
        <div style="font-size:11px;color:#9E8C78;margin-bottom:12px">Toca cualquier día para editar tu turno</div>
      `:`
        <div style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;color:#9E8C78;margin-bottom:8px">Ver equipo del día:</div>
          <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
            ${Array.from({length:14},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()+i-2); return d.toISOString().split('T')[0]; }).map(dk=>`
              <button class="team-date-btn chip ${state.teamDate===dk?'active':'inactive'}" data-dk="${dk}" style="flex-shrink:0">
                ${dk===todayKey()?'Hoy':new Date(dk+'T12:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric'})}
              </button>`).join('')}
          </div>
        </div>
        <div class="section-label">${new Date(state.teamDate+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
        ${(()=>{
          const team=Object.entries(TEAM[state.teamDate]||{}).filter(([n,h])=>h);
          if(!team.length) return '<div class="card" style="background:#F5EFE0"><p class="muted" style="font-size:14px">Sin turnos para este día.</p></div>';
          return team.map(([name,horario])=>`
            <div style="display:flex;align-items:center;gap:14px;padding:12px 16px;background:#fff;border-radius:14px;margin-bottom:8px;border-left:4px solid ${PCOLORS[name]||'#9E8C78'}">
              <div style="width:36px;height:36px;border-radius:18px;background:${PCOLORS[name]||'#9E8C78'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0">${name[0]}</div>
              <div>
                <div style="font-weight:800;font-size:15px">${name===state.currentUser?name+' (tú)':name}</div>
                <div style="font-size:13px;color:#9E8C78">${horario}</div>
              </div>
            </div>`).join('');
        })()}
        <div style="margin-top:20px">
          <div class="section-label">Equipo</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${PERSONAS.map(p=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:5px;background:${PCOLORS[p]}"></div><span style="font-size:12px;font-weight:${p===state.currentUser?800:400}">${p}${p===state.currentUser?' ★':''}</span></div>`).join('')}
          </div>
        </div>
      `}
      <div style="height:80px"></div>`;

    c.querySelector('#v-mes')?.addEventListener('click',()=>{ state.calView='mes'; drawCal(); });
    c.querySelector('#v-equipo')?.addEventListener('click',()=>{ state.calView='equipo'; drawCal(); });
    c.querySelector('#prev-month')?.addEventListener('click',()=>{
      calMon--; if(calMon<0){calMon=11;calYear--;} state.calMonth=calYear*100+calMon; drawCal();
    });
    c.querySelector('#next-month')?.addEventListener('click',()=>{
      calMon++; if(calMon>11){calMon=0;calYear++;} state.calMonth=calYear*100+calMon; drawCal();
    });
    c.querySelectorAll('.day-btn').forEach(b=>b.addEventListener('click',()=>openDayModal(b.dataset.k, getTurno, drawCal)));
    c.querySelectorAll('.day-btn-hoy').forEach(b=>b.addEventListener('click',()=>openDayModal(b.dataset.k, getTurno, drawCal)));
    c.querySelectorAll('.team-date-btn').forEach(b=>b.addEventListener('click',()=>{ state.teamDate=b.dataset.dk; drawCal(); }));
  }
  drawCal();
}

function openDayModal(dateKey, getTurno, refresh){
  const existing = getTurno(dateKey) || {};
  const teamOrig = (TEAM[dateKey]||{})[state.currentUser] || '';
  const hasUserEdit = !!state.userTurnos[dateKey];
  const label = new Date(dateKey+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  // Determine initial state
  let isWork = existing.trabaja !== false;
  // If nothing set at all and no team data => default to libre
  if(!existing.trabaja && !existing.horario && !teamOrig) isWork = false;

  // Parse horario into start/end if possible
  const parts = (existing.horario||teamOrig||'').split('-');
  const initStart = parts[0]||'';
  const initEnd   = parts[1]||'';

  const TURNOS_RAPIDOS = [
    {label:'Mañana',h:'6:00-14:00'},{label:'Mañana+',h:'6:30-14:30'},
    {label:'Tarde 7:30',h:'7:30-15:30'},{label:'Tarde 8',h:'8:00-15:00'},
    {label:'Tarde 11',h:'11:00-15:00'},{label:'Tarde 14',h:'14:00-22:00'},
    {label:'Tarde 14:30',h:'14:30-22:00'},{label:'Partido',h:'7:30-11:30'},
  ];

  openModal(`
    <div class="modal-head">
      <div>
        <h2 style="font-size:16px;font-weight:800;text-transform:capitalize">${label}</h2>
        ${hasUserEdit?'<span style="font-size:11px;color:#C4894B;font-weight:700">✏️ Editado por ti</span>':teamOrig?'<span style="font-size:11px;color:#9E8C78">📋 Del cuadrante</span>':''}
      </div>
      <button class="modal-close">${svg('close',20,'#9E8C78')}</button>
    </div>

    <!-- Tipo de día -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="d-work" style="flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;transition:all .15s;background:${isWork?'#6B3F1F':'#F5EFE0'};color:${isWork?'#fff':'#9E8C78'}">🏪 Trabajo</button>
      <button id="d-rest" style="flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;transition:all .15s;background:${!isWork?'#9E8C78':'#F5EFE0'};color:${!isWork?'#fff':'#9E8C78'}">😴 Libre</button>
    </div>

    <div id="d-work-fields" style="display:${isWork?'flex':'none'};flex-direction:column;gap:12px">
      <!-- Horario manual -->
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Hora entrada – salida</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center">
          <input class="inp" id="d-start" type="time" value="${initStart.includes(':')?initStart:initStart?initStart+':00':''}">
          <span style="color:#9E8C78;font-weight:700;font-size:18px">–</span>
          <input class="inp" id="d-end" type="time" value="${initEnd.includes(':')?initEnd:initEnd?initEnd+':00':''}">
        </div>
      </div>

      <!-- Turnos rápidos -->
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Turnos rápidos</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${TURNOS_RAPIDOS.map(t=>`<button class="quick-turno" data-h="${t.h}" style="padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;background:#F5EFE0;color:#2C1A0E;border:1.5px solid #E8D5B0">${t.label}<span style="color:#9E8C78;font-size:10px;margin-left:4px">${t.h}</span></button>`).join('')}
        </div>
      </div>

      <!-- Compañeras -->
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Con quién trabajas</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px" id="compas-chips">
          ${PERSONAS.filter(p=>p!==state.currentUser).map(p=>{
            const teamH=(TEAM[dateKey]||{})[p];
            const sel=(existing.compas||[]).includes(p);
            return `<button class="compa-chip" data-p="${p}" style="padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;background:${sel?PCOLORS[p]:'#F5EFE0'};color:${sel?'#fff':'#2C1A0E'};border:1.5px solid ${sel?PCOLORS[p]:'#E8D5B0'}">
              ${p}${teamH?` <span style="opacity:.7;font-size:10px">(${teamH})</span>`:''}
            </button>`;
          }).join('')}
        </div>
      </div>

      <!-- Notas -->
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Notas del día</div>
        <input class="inp" id="d-notas" placeholder="Cualquier anotación..." value="${existing.notas||''}">
      </div>

      ${teamOrig?`<div style="font-size:12px;color:#9E8C78;background:#F5EFE0;padding:8px 12px;border-radius:8px">📋 Cuadrante original: <strong>${teamOrig}</strong></div>`:''}
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      <button id="d-save" class="btn btn-md btn-primary" style="width:100%;justify-content:center">${svg('save',18,'#fff')} Guardar</button>
      ${hasUserEdit?`<button id="d-reset" class="btn btn-md" style="width:100%;justify-content:center;background:#F5EFE0;color:#9E8C78">${svg('trash',16,'#9E8C78')} Restaurar cuadrante original</button>`:''}
    </div>
  `);

  // Toggle work/libre
  const btnW=document.querySelector('#d-work'), btnR=document.querySelector('#d-rest');
  const fields=document.querySelector('#d-work-fields');
  function updateType(work){
    isWork=work;
    btnW.style.background=work?'#6B3F1F':'#F5EFE0'; btnW.style.color=work?'#fff':'#9E8C78';
    btnR.style.background=!work?'#9E8C78':'#F5EFE0'; btnR.style.color=!work?'#fff':'#9E8C78';
    fields.style.display=work?'flex':'none';
  }
  btnW.addEventListener('click',()=>updateType(true));
  btnR.addEventListener('click',()=>updateType(false));

  // Quick turno buttons
  document.querySelectorAll('.quick-turno').forEach(b=>b.addEventListener('click',()=>{
    const [s,e]=b.dataset.h.split('-');
    const toTime=v=>v.includes(':')?v:v+':00';
    document.querySelector('#d-start').value=toTime(s);
    document.querySelector('#d-end').value=toTime(e);
    document.querySelectorAll('.quick-turno').forEach(x=>{ x.style.background='#F5EFE0'; x.style.borderColor='#E8D5B0'; x.style.color='#2C1A0E'; });
    b.style.background='#6B3F1F'; b.style.borderColor='#6B3F1F'; b.style.color='#fff';
  }));

  // Compañeras chips
  let selCompas=[...(existing.compas||[])];
  document.querySelectorAll('.compa-chip').forEach(b=>b.addEventListener('click',()=>{
    const p=b.dataset.p;
    if(selCompas.includes(p)) selCompas=selCompas.filter(x=>x!==p);
    else selCompas.push(p);
    b.style.background=selCompas.includes(p)?PCOLORS[p]:'#F5EFE0';
    b.style.borderColor=selCompas.includes(p)?PCOLORS[p]:'#E8D5B0';
    b.style.color=selCompas.includes(p)?'#fff':'#2C1A0E';
  }));

  // Save
  document.querySelector('#d-save').addEventListener('click',()=>{
    const start=document.querySelector('#d-start')?.value||'';
    const end=document.querySelector('#d-end')?.value||'';
    const horario=start&&end?start+'-'+end:(existing.horario||teamOrig||'');
    const notas=document.querySelector('#d-notas')?.value||'';
    state.userTurnos={...state.userTurnos,[dateKey]:{trabaja:isWork,horario,notas,compas:selCompas}};
    save(); closeModal(); refresh();
  });

  // Reset to original
  document.querySelector('#d-reset')?.addEventListener('click',()=>{
    if(confirm('¿Restaurar el turno original del cuadrante?')){
      delete state.userTurnos[dateKey]; save(); closeModal(); refresh();
    }
  });
}

    if(confirm(`¿Eliminar el grupo "${g[gi].label}"?`)){

    }
  }));

function openProgItemModal(ii,gi,c){
  const g=getProgGrupos();
  const existing=ii!==null?g[gi].items[ii]:null;
  openModal(`
    <div class="modal-head"><h2 style="font-size:18px;font-weight:800">${existing?'Editar':'Nueva entrada'}</h2><button class="modal-close">${svg('close',20,'#9E8C78')}</button></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px">Número de programa</div>
        <input class="inp" id="pi-prog" type="text" placeholder="Ej: 5" value="${existing?existing.prog:''}" style="font-size:22px;font-weight:900;text-align:center">
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#9E8C78;margin-bottom:6px">Descripción (productos)</div>
        <input class="inp" id="pi-name" placeholder="Ej: Campesina / Espiga / Integral" value="${existing?existing.name:''}">
      </div>
      <button id="pi-save" class="btn btn-md btn-primary" style="width:100%;justify-content:center">${svg('save',18,'#fff')} Guardar</button>
    </div>
  `);
  document.querySelector('#pi-save').addEventListener('click',()=>{
    const prog=document.querySelector('#pi-prog').value.trim();
    const name=document.querySelector('#pi-name').value.trim();
    if(!prog||!name) return;
    const gs=getProgGrupos();
    if(ii!==null) gs[gi].items[ii]={prog,name};
    else gs[gi].items.push({prog,name});
    saveProgGrupos(gs); closeModal(); renderProgramas(c);
  });
}

// ── MIGRATE: always reset tasks if old format detected
(function migrateTasks(){
  const OLD_CATS=['Producción','Limpieza','Cafetera','Reposición','Cierre','Otras'];
  const tasks = state.tasks;
  const hasOldCats = tasks.length === 0 || tasks.some(t => OLD_CATS.includes(t.cat));
  if(hasOldCats){
    state.tasks = DEFAULT_TASKS.map(t=>({...t,done:false,doneAt:null}));
    S.set('cierre_'+todayKey(), state.tasks);

  // Also always clear old Firebase cierre data
  if(typeof firebase !== 'undefined'){
